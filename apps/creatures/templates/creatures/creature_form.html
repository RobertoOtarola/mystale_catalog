{% extends 'creatures/base.html' %}

{% block title %}Registrar criatura — Mystale{% endblock %}

{% block content %}
<section class="form-section">
  <h1>Registrar nueva criatura</h1>
  <form method="post" novalidate>
    {% csrf_token %}
    {% for field in form %}
      <div class="form-group {% if field.errors %}has-error{% endif %}">
        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
        {{ field }}
        {% for error in field.errors %}
          <span class="field-error">{{ error }}</span>
        {% endfor %}
      </div>
    {% endfor %}
    <div class="form-actions">
      <a href="{% url 'creatures:list' %}" class="btn-secondary">Cancelar</a>
      <button type="submit" class="btn-primary">Registrar criatura</button>
    </div>
  </form>
</section>
{% endblock %}
