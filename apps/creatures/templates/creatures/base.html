<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Mystale Catalog{% endblock %}</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
  <header class="site-header">
    <a href="{% url 'creatures:list' %}" class="logo">⬡ Mystale Catalog</a>
    <nav>
      <a href="{% url 'creatures:list' %}">Catálogo</a>
      <a href="{% url 'creatures:create' %}" class="btn-primary">+ Registrar criatura</a>
    </nav>
  </header>

  <main class="container">
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
